<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Management - Business Daily Close System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="navbar navbar-expand-lg sticky-top" id="main-header">
        <div class="container-fluid">
            <!-- Left Navigation -->
            <div class="navbar-nav flex-row">
                <a class="nav-link me-3" href="{{ url_for('index') }}">
                    <i class="fas fa-home me-1"></i>Home
                </a>
                <a class="nav-link me-3" href="{{ url_for('control_panel') }}">
                    <i class="fas fa-cogs me-1"></i>Control Panel
                </a>
                <a class="nav-link me-3" href="{{ url_for('daily_close') }}">
                    <i class="fas fa-calculator me-1"></i>Daily Close
                </a>
            </div>

            <!-- Right Profile Dropdown -->
            <div class="dropdown ms-auto">
                <button class="btn btn-outline-light dropdown-toggle" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-user me-1"></i>{{ current_user.username }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                    <li><a class="dropdown-item" href="{{ url_for('settings') }}"><i class="fas fa-cog me-2"></i>Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container-fluid mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="display-6">Sales Management</h2>
                        <p class="text-muted">Sales transactions and inventory management</p>
                    </div>
                    <div class="d-flex gap-2">
                        <div class="d-flex gap-2 align-items-center">
                            <select class="form-select" id="salesMonth" style="width: auto;">
                                <option value="">All Months</option>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                            <select class="form-select" id="salesYear" style="width: auto;">
                                <option value="">All Years</option>
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                            <button class="btn btn-outline-primary" onclick="filterSales()">
                                <i class="fas fa-filter me-1"></i>Filter
                            </button>
                        </div>
                        <button class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>Add Sale
                        </button>
                    </div>
                </div>

                <!-- Sales Content -->
                <div class="card">
                    <div class="card-body">
                        <div class="text-center py-5">
                            <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                            <h4 class="text-muted">Sales Management</h4>
                            <p class="text-muted">Sales functionality coming soon...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        function filterSales() {
            const month = document.getElementById('salesMonth').value;
            const year = document.getElementById('salesYear').value;
            
            // Build query parameters
            const params = new URLSearchParams();
            if (month) params.append('month', month);
            if (year) params.append('year', year);
            
            // Redirect to filtered view
            window.location.href = `/control-panel/sales?${params.toString()}`;
        }

        // Set current month and year as default
        document.addEventListener('DOMContentLoaded', function() {
            const currentDate = new Date();
            const currentMonth = currentDate.getMonth() + 1;
            const currentYear = currentDate.getFullYear();
            
            // Set default values if no filters are applied
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.get('month') && !urlParams.get('year')) {
                document.getElementById('salesMonth').value = currentMonth;
                document.getElementById('salesYear').value = currentYear;
            } else {
                document.getElementById('salesMonth').value = urlParams.get('month') || '';
                document.getElementById('salesYear').value = urlParams.get('year') || '';
            }
        });
    </script>
</body>
</html>
