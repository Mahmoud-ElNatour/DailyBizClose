<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Months - Business Daily Close System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="navbar navbar-expand-lg sticky-top" id="main-header">
        <div class="container-fluid">
            <!-- Left Navigation -->
            <div class="navbar-nav flex-row">
                <a class="nav-link me-3" href="{{ url_for('index') }}">
                    <i class="fas fa-home me-1"></i>Home
                </a>
                <a class="nav-link me-3" href="{{ url_for('control_panel') }}">
                    <i class="fas fa-cogs me-1"></i>Control Panel
                </a>
                <a class="nav-link me-3" href="{{ url_for('daily_close') }}">
                    <i class="fas fa-calculator me-1"></i>Daily Close
                </a>
            </div>

            <!-- Right Profile Dropdown -->
            <div class="dropdown ms-auto">
                <button class="btn btn-outline-light dropdown-toggle" type="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-user me-1"></i>{{ current_user.username }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                    <li><a class="dropdown-item" href="{{ url_for('settings') }}"><i class="fas fa-cog me-2"></i>Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container-fluid mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="display-6">Employees - {{ year }}</h2>
                        <p class="text-muted">Select a month to view employees</p>
                    </div>
                    <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Back
                    </a>
                </div>
                  <div class="row row-cols-1 row-cols-md-3 g-4">
                      {% for month, name in months %}
                      <div class="col">
                          <div class="card text-center h-100">
                              <div class="card-body">
                                  <h5 class="card-title">{{ name }}</h5>
                                  <a href="{{ url_for('employees_list', year=year, month=month) }}" class="stretched-link"></a>
                              </div>
                          </div>
                      </div>
                      {% else %}
                      <p class="text-center text-muted">No employee records found</p>
                      {% endfor %}
                  </div>
                  <div class="mt-4">
                      <div class="row justify-content-center">
                          <div class="col-md-6">
                              <div class="input-group">
                                  <input type="number" id="monthInput" class="form-control" placeholder="Enter month (1-12)" min="1" max="12">
                                  <button class="btn btn-primary" type="button" onclick="goToMonth()">Go</button>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </main>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="{{ url_for('static', filename='script.js') }}"></script>
      <script>
          function goToMonth() {
              const m = document.getElementById('monthInput').value;
              if (m >= 1 && m <= 12) {
                  const url = "{{ url_for('employees_list', year=year, month=1) }}".replace('/1', '/' + m);
                  window.location.href = url;
              }
          }
      </script>
  </body>
  </html>
